<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>マスタープログラム 演習ノート</title>
<style>
:root{--ink:#1a1208;--ink-l:#4a3f2f;--paper:#faf8f3;--warm:#f5f1e8;--rule:#d4c9b0;--acc:#8b3a1a;--acc2:#c4703a;--gold:#b8972a;--goldl:#e8d88a;--sbg:#f0ebe0;--sh:rgba(26,18,8,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.7}
.app-header{background:var(--ink);color:var(--paper);padding:14px 16px 10px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px var(--sh)}
.app-title{font-size:14px;font-weight:600;letter-spacing:.05em}
.app-title span{color:var(--goldl);font-size:10px;display:block;letter-spacing:.1em;margin-top:2px;font-weight:400;opacity:.9}
.step-tabs{display:flex;background:#2a1f10;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #3a2e1a;padding:0 6px}
.step-tabs::-webkit-scrollbar{display:none}
.step-tab{padding:7px 11px;font-size:11px;font-weight:600;color:#9a8060;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;letter-spacing:.04em;flex-shrink:0}
.step-tab.active{color:var(--goldl);border-bottom-color:var(--gold)}
.day-tabs{display:flex;background:var(--warm);border-bottom:1px solid var(--rule);overflow-x:auto;scrollbar-width:none;padding:0 10px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:7px 13px;font-size:12px;font-weight:500;color:var(--ink-l);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;flex-shrink:0}
.day-tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
.content{padding:14px 14px 110px;max-width:720px;margin:0 auto}
.step-panel{display:none}.step-panel.active{display:block}
.day-panel{display:none}.day-panel.active{display:block}
.day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
.day-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0}
.day-theme{font-size:14px;font-weight:700;color:var(--ink);letter-spacing:.04em}
.day-week{font-size:10px;color:var(--ink-l);margin-left:auto;opacity:.6;white-space:nowrap;flex-shrink:0}
.round-row{display:flex;align-items:center;gap:7px;margin-bottom:14px;background:var(--sbg);border-radius:5px;padding:7px 12px;border:1px solid var(--rule);flex-wrap:wrap}
.round-lbl{font-size:11px;color:var(--ink-l);font-weight:600;letter-spacing:.06em}
.round-btn{width:28px;height:28px;border:1.5px solid var(--rule);background:#fff;border-radius:50%;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-l);transition:all .18s;flex-shrink:0}
.round-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.add-round{width:28px;height:28px;border:1.5px dashed var(--rule);background:transparent;border-radius:50%;font-size:16px;cursor:pointer;color:var(--rule);transition:all .18s;line-height:1;flex-shrink:0}
.add-round:hover{border-color:var(--acc2);color:var(--acc2)}
.qb{margin-bottom:14px;background:#fff;border:1px solid var(--rule);border-radius:6px;overflow:hidden;box-shadow:0 1px 4px var(--sh)}
.qh{padding:10px 13px 8px;background:var(--warm);border-bottom:1px solid var(--rule)}
.qt{font-size:13px;color:var(--ink);line-height:1.55;font-weight:500}
.qb-body{padding:9px 13px 11px}
textarea{width:100%;border:none;border-bottom:1.5px solid var(--rule);background:transparent;resize:none;font-family:inherit;font-size:13px;color:var(--ink);padding:5px 2px;line-height:1.7;outline:none;transition:border-color .2s;overflow:hidden;min-height:36px}
textarea:focus{border-bottom-color:var(--acc2)}
textarea::placeholder{color:#ccc;font-size:12px}
.sub-lbl{font-size:11px;color:var(--acc);font-weight:600;letter-spacing:.04em;margin-bottom:2px;display:block;margin-top:9px}
.sub-lbl:first-child{margin-top:0}
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;margin-top:5px}
.cb-grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.ci{display:flex;align-items:flex-start;gap:6px;cursor:pointer;padding:3px 4px;border-radius:3px}
.ci input[type=checkbox]{width:14px;height:14px;accent-color:var(--acc);cursor:pointer;flex-shrink:0;margin-top:2px}
.ci label{font-size:12px;color:var(--ink);cursor:pointer;line-height:1.4}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.tbl th{background:var(--sbg);padding:6px 8px;text-align:left;font-weight:600;color:var(--ink-l);border:1px solid var(--rule);font-size:11px}
.tbl td{border:1px solid var(--rule);padding:0}
.tbl td input{width:100%;border:none;padding:5px 8px;font-size:12px;font-family:inherit;color:var(--ink);background:transparent;outline:none}
.tbl td input:focus{background:rgba(139,58,26,.04)}
.tbl .rl{padding:5px 8px;font-size:12px;color:var(--ink-l);background:var(--warm);border-right:1px solid var(--rule);white-space:nowrap}
.score-row{display:flex;align-items:center;gap:8px;margin:5px 0;flex-wrap:wrap}
.score-inp{width:62px;text-align:center;border:1.5px solid var(--rule);border-radius:4px;padding:5px;font-size:16px;font-weight:700;color:var(--acc);outline:none;background:#fff;transition:border-color .2s}
.score-inp:focus{border-color:var(--acc2)}
.score-lbl{font-size:11px;color:var(--ink-l)}
.pg{margin-bottom:10px;padding:9px 11px;border:1px solid var(--rule);border-radius:5px;background:var(--warm)}
.pg:last-child{margin-bottom:0}
.pg-ttl{font-size:13px;color:var(--acc);font-weight:700;margin-bottom:6px}
.ni{border:none;border-bottom:1px solid var(--rule);width:100%;padding:4px 2px;font-family:inherit;font-size:13px;outline:none;background:transparent;margin-bottom:5px;color:var(--ink)}
.pledge{margin-top:6px;padding:12px 13px;background:linear-gradient(135deg,#fdf8ef,#faf4e4);border:1px solid var(--goldl);border-radius:5px}
.pledge-ttl{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.1em;margin-bottom:7px;text-align:center}
.tl-tbl{width:100%;border-collapse:collapse;font-size:12px}
.tl-tbl td{border:1px solid var(--rule);padding:3px 7px}
.tl-tbl .t-lbl{width:46px;background:var(--warm);font-weight:600;color:var(--ink-l);text-align:center;font-size:11px}
.tl-tbl input{width:100%;border:none;padding:2px 4px;font-family:inherit;font-size:12px;background:transparent;outline:none}
.action-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--rule);padding:9px 14px;display:flex;gap:7px;align-items:center;box-shadow:0 -2px 12px var(--sh);z-index:100}
.btn{padding:9px 16px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:all .18s;border:none}
.btn-p{background:var(--acc);color:#fff;flex:1}
.btn-s{background:var(--warm);color:var(--ink-l);border:1.5px solid var(--rule);padding:9px 12px}
.save-st{font-size:11px;color:var(--ink-l);opacity:0;transition:opacity .3s}
.save-st.show{opacity:1}
.toast{position:fixed;top:60px;right:12px;background:var(--ink);color:#fff;padding:9px 14px;border-radius:5px;font-size:12px;letter-spacing:.04em;opacity:0;transform:translateY(-8px);transition:all .25s;z-index:200;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}
.hc{background:#fff;border:1px solid var(--rule);border-radius:5px;margin-bottom:10px;overflow:hidden}
.hc-hdr{background:var(--warm);padding:9px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--rule);cursor:pointer}
.hc-ttl{font-size:13px;font-weight:700;color:var(--ink)}
.hc-meta{font-size:11px;color:var(--ink-l);opacity:.7}
.hc-body{padding:10px 12px;display:none}
.hc-body.open{display:block}
.hi{margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--rule);font-size:13px;white-space:pre-wrap}
.hi:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.note-box{background:var(--sbg);border-radius:4px;padding:8px 10px;font-size:12px;color:var(--ink-l);margin-bottom:10px;line-height:1.6}
.scale-row{display:flex;align-items:center;gap:6px;margin:5px 0;flex-wrap:wrap}
.scale-lbl-s{font-size:10px;color:var(--ink-l)}
.habit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.habit-cell{border:1px solid var(--rule);border-radius:4px;overflow:hidden}
.habit-cell-hdr{background:var(--sbg);padding:5px 8px;font-size:11px;font-weight:700;color:var(--ink-l);border-bottom:1px solid var(--rule)}
.habit-cell textarea{border-bottom:none;padding:6px 8px;min-height:60px}
.hist-empty{text-align:center;padding:50px 20px;color:var(--rule);font-size:13px}
</style>
</head>
<body>
<div class="app-header">
  <div class="app-title">マスタープログラム 演習ノート<span>Achievement Technology — 全13STEP完全版</span></div>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div class="day-tabs" id="dayTabs"></div>
<div class="content" id="mainContent"></div>
<div class="action-bar">
  <button class="btn btn-s" onclick="clearDay()">クリア</button>
  <button class="btn btn-p" onclick="copyData()">📋 コピー</button>
  <span class="save-st" id="saveSt">✓ 保存済み</span>
</div>
<div class="toast" id="toast"></div>
<script>
// ===== STEP定義 =====
const STEPS=[
{id:'s1',label:'STEP1',title:'成功は技術である',days:[
{id:'d1',label:'Day 1',badge:'1st Week - 1st day',theme:'未来をつくる思考の力',qs:[
{t:'ta',l:'1. ナイチンゲールから学んだ、信念とはどのような力か。このセクションから学んだことをまとめましょう。'},
{t:'persons1',l:'2. 身近な人で、強い信念を持ち現実をつくり出した人を一人挙げてください。',fields:['人物','成し遂げたこと','信念']},
{t:'ta',l:'3. 過去、あなたが高い目標達成に挑戦するなかで、大きな困難や障害にぶつかりながらも乗り越えた経験はありますか。'},
{t:'ta',l:'4. なぜ、その壁を乗り越えることができたのでしょうか。そのとき、あなたはどのような信念を持っていたと思いますか。'},
{t:'ta',l:'5. 逆に、大きな困難や障害にぶつかり乗り越えられなかった経験はありますか。'},
{t:'ta',l:'6. なぜ乗り越えることができなかったのでしょうか。どのような信念があれば乗り越えられたと思いますか。'},
]},
{id:'d2',label:'Day 2',badge:'1st Week - 2nd day',theme:'未来をつくる思考の力',qs:[
{t:'ta',l:'7. 望むことと信じることには、どのような違いがあると思いますか。'},
{t:'ta',l:'8. 今、あなたが何が何でも達成したいと思っている目標は何ですか。'},
{t:'su',l:'9. その目標は必ず達成できると、何%信じていますか。',unit:'%'},
{t:'ta',l:'10. 今目指している目標の達成を、100%の「信念」に変えるために、これから何に取り組みますか。'},
{t:'pledge'},
]},
{id:'d3',label:'Day 3',badge:'1st Week - 3rd day',theme:'一点の曇りなき積極思考',qs:[
{t:'sc4',l:'1. 自分の仕事・家族・パートナー・人生に対する自信を、0〜100で点数をつけてください。',items:['①自分の仕事','②自分の家族','③自分のパートナー（配偶者・恋人）','④自分の人生']},
{t:'r4',l:'2. 問1で、なぜその点数をつけましたか。それぞれの理由を書き出してください。',items:['①仕事','②家族','③パートナー','④人生']},
{t:'r4',l:'3. もし全ての項目に100点をつけるとしたら、それぞれどのように考えたとき100点をつけられるでしょうか。',items:['①仕事','②家族','③パートナー','④人生']},
{t:'ta',l:'4. 毎日、問3で書き出した考え方を選択し続けたとしたら、あなたの人生はどのように変化すると思いますか。'},
]},
{id:'d4',label:'Day 4',badge:'1st Week - 4th day',theme:'一点の曇りなき積極思考',qs:[
{t:'pn3',l:'5. 次の3つの現象に対して、ネガティブ・ポジティブなものの見方を考えて答えてください。',items:['①「家を出ようとしたら雨が降っていた」','②「メンバーがミーティングに無断で遅刻した」','③「恋人（配偶者）から食事の予定を直前にキャンセルされた」']},
{t:'ml',l:'6. 最近、あなたがネガティブに捉えた出来事はありますか。それをポジティブに捉えるにはどうすればよいですか。',subs:['ネガティブに捉えた出来事','ポジティブに捉えるためには']},
{t:'ta',l:'7. 常にポジティブな考え方を選び続けるために、これからどのようなことに取り組みますか。'},
{t:'pledge'},
]},
{id:'d5',label:'Day 5',badge:'1st Week - 5th day',theme:'信念を育む自己暗示',qs:[
{t:'ta',l:'1. あなたは、思い描いたとおりの成果が出ているとき、どのような言葉を自分にかけていますか。'},
{t:'ta',l:'2. あなたは、思い描いたとおりの成果が出ていないとき、どのような言葉を自分にかけていますか。'},
{t:'ta',l:'3. あなたがよく自分にかけている言葉は、あなたにどのような影響を与えていると思いますか。'},
{t:'ta',l:'4. どのような言葉かけをすると、あなたが望む目標達成や成功に効果的でしょうか。継続して使うものや、よりよい言葉かけに変えられるものは何だと思いますか。'},
]},
{id:'d6',label:'Day 6',badge:'1st Week - 6th day',theme:'信念を育む自己暗示',qs:[
{t:'env',l:'5. 日常生活のなかで、以下のものを活用し、毎日自分に肯定的な暗示をかけ続けるとしたら、それぞれどのように活用しますか。',items:['テレビや映画','新聞','書籍','SNSの情報','身近な人からの言葉','その他']},
{t:'ta',l:'6. 肯定的な暗示を毎日かけられるように、視覚的に工夫できることはありますか。'},
{t:'roles5',l:'7. あなたは、どのような役割を持っていますか。それぞれの役割に沿って、どのような人間でありたいか暗示の言葉を書いてみましょう。（5組）'},
{t:'pledge'},
]},
]},
{id:'s2',label:'STEP2',title:'人生の目的を持つ',days:[
{id:'d1',label:'Day 1',badge:'2nd Week - 1st day',theme:'目的から一貫した人生を描く',qs:[
{t:'cbf',l:'1. あなたの人生において、判断基準となる価値観や信条は何ですか。人生理念キーワードから3つ選んでください。当てはまるものがなければ、自由記入欄に書いてください。',items:['愛','感謝','平和','思いやり','優しさ','素直','誠実','謙虚','正直','本心','等身大','丁寧','親切','家族','喜び','笑顔','励ます','進む','挑戦','情熱','躍動','実力','成長','向上心','活気','共創','絆','出会い','未知','発見','創造','純粋','上質','感動','認める','決める','責任','完遂','真剣','本気','卓越','価値','探求','追求','好奇心','変化','選択','幸福','貢献','一期一会','本質','約束','生きる','笑う','信念','忍耐','達成','承認','尊敬','努力','一貫性','熱中','熱意','意志','表現','堅実','自然体','没頭','志','懸ける','結ぶ','仲間','信頼','恩返し','共感','真心','誇り','自信','真理','協調','受容','支援','実行','懸命','礼','正義','求める','勝つ','伝える','愛する','輝く','導く','達成する','楽しむ','生み出す','尊重する','鍛える','守る','突き抜ける','尽くす','磨く','理解する','知る','支える','繫ぐ','応援する']},
{t:'ta',l:'2. あなたの人生理念は何ですか。問1で選んだキーワードの意味を書き出しましょう。'},
]},
{id:'d2',label:'Day 2',badge:'2nd Week - 2nd day',theme:'目的から一貫した人生を描く',qs:[
{t:'ta',l:'3. あなたは、なぜその言葉を選びましたか。'},
{t:'ta',l:'4. 人生理念にもとづいて日々を過ごしたとしたら、どのような人生を手にすることができると考えますか。'},
{t:'ml',l:'5. 今、あなたは大切にしたい価値観・理念から一貫した行動を、毎日とっていますか。',subs:['理念にもとづいて行動できているとき','理念にもとづいて行動できていないとき']},
{t:'ta',l:'6. さらに理念から一貫した行動をとり続けるために、何をすべきでしょうか。'},
{t:'ta',l:'7. 理念を大切にしながらあなたはどのようなビジョンを実現しますか。'},
{t:'ta',l:'8. あなたは、誰のために、何のために、何を大切にして生きますか。「人生の目的」を書き出してください。'},
{t:'pledge'},
]},
{id:'d3',label:'Day 3',badge:'2nd Week - 3rd day',theme:'バランスのとれたビジョンを持つ',qs:[
{t:'yoku',l:'1. 生存の欲求について',min:'病んでいる',max:'絶好調',vl:'あなたが理想とする、心身ともに健康な人生とはどのようなものですか。'},
{t:'yoku',l:'2. 愛・所属の欲求について',min:'孤独',max:'素晴らしい人間関係に恵まれている',vl:'あなたが理想とする、愛に満たされた人生とはどのようなものですか。'},
{t:'yoku',l:'3. 力の欲求について',min:'自分の価値を感じられない',max:'人の役に立っている',vl:'あなたが理想とする、人の役に立つ価値ある人生とはどのようなものですか。'},
]},
{id:'d4',label:'Day 4',badge:'2nd Week - 4th day',theme:'バランスのとれたビジョンを持つ',qs:[
{t:'yoku',l:'4. 自由の欲求について',min:'経済的にも精神的にも不自由',max:'経済的にも精神的にも自由',vl:'あなたが理想とする、心の平安と経済的自由のある人生とはどのようなものですか。'},
{t:'yoku',l:'5. 楽しみの欲求について',min:'つまらない',max:'毎日楽しい',vl:'あなたが理想とする、楽しみに満ちた人生とはどのようなものですか。'},
{t:'ml',l:'6. バランスのとれた人生を実現していくことが重要です。あなたがつい注力しがちな分野、逆に、おろそかになりがちな分野はどの分野ですか。',subs:['注力しがちな分野','おろそかになりがちな分野']},
{t:'ta',l:'7. バランスのとれた人生を実現するために、あなたは何を意識し、どのようなことに取り組みますか。'},
{t:'pledge'},
]},
{id:'d5',label:'Day 5',badge:'2nd Week - 5th day',theme:'段階を追った自己実現',qs:[
{t:'cb',l:'1. 今、あなたは「戦略的人生経営」のなかで、どの段階に位置していると思いますか。',items:['学習の段階（種蒔き）','指導力開発の段階（種蒔き）','挑戦の段階（種蒔き）','富の形成の段階（収穫）','社会還元の段階（還元）']},
{t:'ta',l:'2. 問1であなたが自分はその段階にいると考えた理由は何ですか。'},
{t:'lstg',l:'3. あなた自身はどのように戦略的人生経営をしていくのかを考え、以下の表に記入しましょう。'},
{t:'ta',l:'4. あなたが今いる人生のステージから、次のステージに上がるためには、どのような挑戦をし、どのような能力を身につける必要がありますか。'},

// ===== BUILD HTML =====
function buildAll(){
  const st=document.getElementById('stepTabs');
  STEPS.forEach((s,i)=>{
    const d=document.createElement('div');d.className='step-tab'+(i===0?' active':'');
    d.textContent=s.label;d.onclick=()=>activateStep(i);st.appendChild(d);
  });
  const ht=document.createElement('div');ht.className='step-tab';ht.id='histTab';
  ht.textContent='📋 履歴';ht.onclick=showHistory;st.appendChild(ht);
  const mc=document.getElementById('mainContent');
  STEPS.forEach((step,si)=>{
    const sp=document.createElement('div');sp.className='step-panel';sp.id='sp_'+si;
    step.days.forEach((day,di)=>{
      const dp=document.createElement('div');dp.className='day-panel';dp.id=`dp_${si}_${di}`;
      dp.innerHTML=buildDay(step,day,si,di);sp.appendChild(dp);
    });
    mc.appendChild(sp);
  });
  const hp=document.createElement('div');hp.id='historyPanel';hp.style.display='none';mc.appendChild(hp);
  activateStep(0);
}

function buildDay(step,day,si,di){
  const k=rk(si,di);
  let h=`<div class="day-hdr"><div class="day-badge">${day.badge}</div><div class="day-theme">${day.theme}</div><div class="day-week">${step.title}</div></div>
<div class="round-row" id="rr_${k}"><span class="round-lbl">周回：</span><button class="round-btn active" onclick="switchRound(${si},${di},1)">1</button><button class="add-round" onclick="addRound(${si},${di})" title="周回追加">＋</button></div>`;
  day.qs.forEach((q,qi)=>{h+=bq(q,si,di,qi);});
  return h;
}

// ===== NAVIGATION =====
function activateStep(si){
  cs=si;
  document.querySelectorAll('.step-tab').forEach((t,i)=>t.classList.toggle('active',i===si));
  document.getElementById('histTab').classList.remove('active');
  document.querySelectorAll('.step-panel').forEach((p,i)=>p.classList.toggle('active',i===si));
  document.getElementById('historyPanel').style.display='none';
  buildDayTabs(si);activateDay(si,0);
}
function buildDayTabs(si){
  const dt=document.getElementById('dayTabs');dt.innerHTML='';
  STEPS[si].days.forEach((day,di)=>{
    const d=document.createElement('div');
    d.className='day-tab'+(di===0?' active':'');d.textContent=day.label;
    d.id=`dt_${si}_${di}`;d.onclick=()=>activateDay(si,di);dt.appendChild(d);
  });
}
function activateDay(si,di){
  cd=di;const k=rk(si,di);
  if(!rounds[k])rounds[k]=1;
  if(!rmax[k])rmax[k]=parseInt(localStorage.getItem(`mp3_rmax_${k}`)||'1');
  document.querySelectorAll(`[id^="dt_${si}_"]`).forEach((t,i)=>t.classList.toggle('active',i===di));
  document.querySelectorAll(`#sp_${si} .day-panel`).forEach((p,i)=>p.classList.toggle('active',i===di));
  renderRounds(si,di);loadData(si,di,rounds[k]);setTimeout(autoResizeAll,50);
}
function renderRounds(si,di){
  const k=rk(si,di);const rr=document.getElementById(`rr_${k}`);if(!rr)return;
  const cur=rounds[k]||1,mx=rmax[k]||1;
  rr.querySelectorAll('.round-btn').forEach(b=>b.remove());
  const add=rr.querySelector('.add-round');
  for(let i=1;i<=mx;i++){const btn=document.createElement('button');btn.className='round-btn'+(i===cur?' active':'');btn.textContent=i;btn.onclick=((n)=>()=>switchRound(si,di,n))(i);rr.insertBefore(btn,add);}
}
function switchRound(si,di,r){saveData(si,di);const k=rk(si,di);rounds[k]=r;renderRounds(si,di);loadData(si,di,r);setTimeout(autoResizeAll,50);}
function addRound(si,di){saveData(si,di);const k=rk(si,di);rmax[k]=(rmax[k]||1)+1;localStorage.setItem(`mp3_rmax_${k}`,rmax[k]);rounds[k]=rmax[k];renderRounds(si,di);loadData(si,di,rounds[k]);setTimeout(autoResizeAll,50);}

// ===== DATA =====
function collectData(si,di){
  const k=rk(si,di),r=rounds[k]||1,pfx=`${k}_r${r}_`;
  const data={};
  document.querySelectorAll(`[id^="${pfx}"]`).forEach(el=>{
    if(el.type==='checkbox')data[el.id]=el.checked;
    else if(el.type==='radio'){if(el.checked)data[el.name]=el.value;}
    else if(el.id)data[el.id]=el.value;
  });
  return data;
}
function saveData(si,di){
  const k=rk(si,di),r=rounds[k]||1;
  const data=collectData(si,di);data._ts=new Date().toISOString();
  localStorage.setItem(dkey(si,di,r),JSON.stringify(data));
}
function loadData(si,di,r){
  const k=rk(si,di),pfx=`${k}_r${r}_`;
  document.querySelectorAll(`[id^="${pfx}"]`).forEach(el=>{if(el.type==='checkbox')el.checked=false;else if(el.type!=='radio')el.value='';});
  const raw=localStorage.getItem(dkey(si,di,r));if(!raw)return;
  const data=JSON.parse(raw);
  Object.entries(data).forEach(([k2,v])=>{
    if(k2==='_ts')return;
    const el=document.getElementById(k2);
    if(el){if(el.type==='checkbox')el.checked=!!v;else el.value=v||'';}
    else{const rds=document.querySelectorAll(`[name="${k2}"]`);rds.forEach(r2=>{if(r2.value==v)r2.checked=true;});}
  });
}
let saveTimer=null;
function autoSave(si,di){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    saveData(si!==undefined?si:cs,di!==undefined?di:cd);
    const s=document.getElementById('saveSt');s.textContent='✓ 保存済み';s.classList.add('show');
    setTimeout(()=>s.classList.remove('show'),1800);
  },600);
}

// ===== COPY =====
function copyData(){
  saveData(cs,cd);
  const k=rk(cs,cd),r=rounds[k]||1;
  const step=STEPS[cs],day=step.days[cd];
  const now=new Date();const ds=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  let lines=[`【${step.label} ${step.title} - ${day.badge} | 周回${r} | ${ds}】`,`テーマ：${day.theme}`,''];
  const panel=document.getElementById(`dp_${cs}_${cd}`);
  panel.querySelectorAll('.qb').forEach(qb=>{
    const qt=qb.querySelector('.qt');
    if(qt)lines.push(`■ ${qt.textContent.trim().replace(/\s+/g,' ')}`);
    qb.querySelectorAll('textarea,[type="text"],[type="number"]').forEach(el=>{
      if(el.value.trim()){
        const lbl=el.previousElementSibling;
        if(lbl&&lbl.classList&&lbl.classList.contains('sub-lbl'))lines.push(`  ${lbl.textContent.replace(/：$/,'')}：${el.value.trim()}`);
        else lines.push(`  ${el.value.trim()}`);
      }
    });
    const cks=[];
    qb.querySelectorAll('input[type="checkbox"]:checked').forEach(el=>{const lb=el.parentElement.querySelector('label');if(lb)cks.push(lb.textContent.trim());});
    if(cks.length)lines.push(`  チェック：${cks.join('、')}`);
    lines.push('');
  });
  const pl=panel.querySelector('[id$="pledge"]');
  if(pl&&pl.value.trim()){lines.push('【実践への誓い】');lines.push(pl.value.trim());}
  const text=lines.join('\n');
  navigator.clipboard.writeText(text).then(()=>{saveHist(cs,cd,r,ds);showToast('📋 コピー完了！スプレッドシートに貼り付けてください');updateHist();}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);saveHist(cs,cd,r,ds);showToast('📋 コピー完了！スプレッドシートに貼り付けてください');updateHist();});
}
function saveHist(si,di,r,ds){
  const hist=JSON.parse(localStorage.getItem('mp3_history')||'[]');
  const data=collectData(si,di);
  hist.unshift({si,di,r,ds,data,ts:Date.now()});
  if(hist.length>100)hist.pop();
  localStorage.setItem('mp3_history',JSON.stringify(hist));
}

// ===== HISTORY =====
function showHistory(){
  document.querySelectorAll('.step-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('histTab').classList.add('active');
  document.querySelectorAll('.step-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('historyPanel').style.display='block';
  document.getElementById('dayTabs').innerHTML='';
  updateHist();
}
function updateHist(){
  const hp=document.getElementById('historyPanel');if(!hp||hp.style.display==='none')return;
  const hist=JSON.parse(localStorage.getItem('mp3_history')||'[]');
  if(!hist.length){hp.innerHTML='<div class="hist-empty">まだ履歴がありません。<br>各Dayで回答してコピーしてください。</div>';return;}
  hp.innerHTML='<div style="padding:12px 0 4px;font-size:12px;color:var(--ink-l);font-weight:600">コピー履歴（最新100件）</div>'+
  hist.map((h,i)=>{
    const step=STEPS[h.si];const day=step?step.days[h.di]:null;
    const ttl=day?`${step.label} - ${day.label} / 周回${h.r}`:`記録 ${i+1}`;
    const items=Object.entries(h.data||{}).filter(([k,v])=>k!=='_ts'&&v&&typeof v==='string'&&v.trim()).slice(0,3).map(([,v])=>`<div class="hi">${v.trim().substring(0,100)}${v.length>100?'…':''}</div>`).join('');
    return `<div class="hc"><div class="hc-hdr" onclick="toggleHist(${i})"><div class="hc-ttl">${ttl}</div><div class="hc-meta">${h.ds}</div></div><div class="hc-body" id="hb_${i}">${items||'<div style="color:var(--rule);font-size:12px">（チェックのみ）</div>'}</div></div>`;
  }).join('');
}
function toggleHist(i){const b=document.getElementById(`hb_${i}`);b.classList.toggle('open');}

// ===== HELPERS =====
function clearDay(){if(!confirm('このDayの現在の周回の回答をクリアしますか？'))return;const k=rk(cs,cd),r=rounds[k]||1,pfx=`${k}_r${r}_`;document.querySelectorAll(`[id^="${pfx}"]`).forEach(el=>{if(el.type==='checkbox')el.checked=false;else if(el.type!=='radio')el.value='';});localStorage.removeItem(dkey(cs,cd,r));showToast('クリアしました');}
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function autoResizeAll(){document.querySelectorAll('textarea').forEach(autoResize);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

window.addEventListener('load',buildAll);
