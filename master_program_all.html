<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マスタープログラム 演習ノート 全13STEP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');
:root{--ink:#1a1208;--ink-l:#4a3f2f;--paper:#faf8f3;--warm:#f5f1e8;--rule:#d4c9b0;--acc:#8b3a1a;--acc2:#c4703a;--gold:#b8972a;--goldl:#e8d88a;--sbg:#f0ebe0;--sh:rgba(26,18,8,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.7}
.app-header{background:var(--ink);color:var(--paper);padding:16px 20px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px var(--sh)}
.app-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:400;letter-spacing:.1em}
.app-title span{color:var(--goldl);font-size:10px;display:block;letter-spacing:.12em;margin-top:2px;font-family:'Noto Sans JP',sans-serif;font-weight:300}
/* STEP TABS (上段) */
.step-tabs{display:flex;background:#2a1f10;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #3a2e1a;padding:0 8px}
.step-tabs::-webkit-scrollbar{display:none}
.step-tab{padding:8px 12px;font-size:11px;font-weight:600;color:#9a8060;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;letter-spacing:.05em}
.step-tab.active{color:var(--goldl);border-bottom-color:var(--gold)}
.step-tab:hover:not(.active){color:#d4b880}
/* DAY TABS (下段) */
.day-tabs{display:flex;background:var(--warm);border-bottom:1px solid var(--rule);overflow-x:auto;scrollbar-width:none;padding:0 12px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--ink-l);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;letter-spacing:.04em}
.day-tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.day-tab:hover:not(.active){background:rgba(0,0,0,.03);color:var(--ink)}
/* CONTENT */
.content{padding:16px 16px 120px;max-width:720px;margin:0 auto}
.step-panel{display:none}.step-panel.active{display:block}
.day-panel{display:none}.day-panel.active{display:block}
/* DAY HEADER */
.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
.day-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 9px;border-radius:2px;white-space:nowrap}
.day-theme{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;color:var(--ink);letter-spacing:.05em}
.day-week{font-size:10px;color:var(--ink-l);margin-left:auto;opacity:.65;letter-spacing:.05em;white-space:nowrap}
/* ROUND */
.round-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;background:var(--sbg);border-radius:5px;padding:8px 12px;border:1px solid var(--rule);flex-wrap:wrap}
.round-lbl{font-size:11px;color:var(--ink-l);font-weight:500;letter-spacing:.06em}
.round-btn{width:26px;height:26px;border:1.5px solid var(--rule);background:#fff;border-radius:50%;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink-l);transition:all .18s;font-family:'Noto Sans JP',sans-serif;flex-shrink:0}
.round-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.round-btn:hover:not(.active){border-color:var(--acc2);color:var(--acc)}
.add-round{width:26px;height:26px;border:1.5px dashed var(--rule);background:transparent;border-radius:50%;font-size:15px;cursor:pointer;color:var(--rule);transition:all .18s;line-height:1;flex-shrink:0}
.add-round:hover{border-color:var(--acc2);color:var(--acc2)}
/* Q BLOCK */
.qb{margin-bottom:18px;background:#fff;border:1px solid var(--rule);border-radius:5px;overflow:hidden;box-shadow:0 1px 4px var(--sh)}
.qh{padding:10px 14px 8px;background:var(--warm);border-bottom:1px solid var(--rule);display:flex;align-items:flex-start;gap:8px}
.qn{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600;color:var(--acc);line-height:1;min-width:22px}
.qt{font-size:13px;color:var(--ink);line-height:1.55;font-weight:400;flex:1}
.qb-body{padding:10px 14px 12px}
textarea{width:100%;border:none;border-bottom:1.5px solid var(--rule);background:transparent;resize:none;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);padding:5px 2px;line-height:1.7;outline:none;transition:border-color .2s;overflow:hidden}
textarea:focus{border-bottom-color:var(--acc2)}
textarea::placeholder{color:var(--rule);font-size:12px}
.sub-lbl{font-size:11px;color:var(--ink-l);font-weight:500;letter-spacing:.05em;margin-bottom:3px;display:block;margin-top:8px}
.sub-lbl:first-child{margin-top:0}
/* CHECKBOX */
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-top:4px}
.ci{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 5px;border-radius:3px;transition:background .15s}
.ci:hover{background:var(--warm)}
.ci input[type=checkbox]{width:13px;height:13px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.ci label{font-size:12px;color:var(--ink);cursor:pointer;line-height:1.35}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.tbl th{background:var(--sbg);padding:7px 9px;text-align:left;font-weight:500;color:var(--ink-l);border:1px solid var(--rule);font-size:11px}
.tbl td{border:1px solid var(--rule);padding:0}
.tbl td input{width:100%;border:none;padding:6px 9px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:transparent;outline:none}
.tbl td input:focus{background:rgba(139,58,26,.04)}
.tbl .rl{padding:6px 9px;font-size:12px;color:var(--ink-l);background:var(--warm);border-right:1px solid var(--rule)}
/* SCORE */
.score-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.score-inp{width:60px;text-align:center;border:1.5px solid var(--rule);border-radius:4px;padding:5px 7px;font-size:16px;font-weight:700;font-family:'Noto Serif JP',serif;color:var(--acc);outline:none;background:#fff;transition:border-color .2s}
.score-inp:focus{border-color:var(--acc2)}
.score-unit{font-size:13px;color:var(--ink-l);font-weight:500}
/* PERSON GROUP */
.pg{margin-bottom:12px;padding:10px 12px;border:1px solid var(--rule);border-radius:5px;background:var(--warm)}
.pn{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--acc);font-weight:600;margin-bottom:7px}
.name-inp{border:none;border-bottom:1px solid var(--rule);width:100%;padding:3px 2px;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;background:transparent;margin-bottom:6px}
/* PLEDGE */
.pledge{margin-top:6px;padding:12px 14px;background:linear-gradient(135deg,#fdf8ef,#faf4e4);border:1px solid var(--goldl);border-radius:5px}
.pledge-ttl{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.1em;margin-bottom:8px;text-align:center}
/* TIMELINE TABLE */
.tl-tbl{width:100%;border-collapse:collapse;font-size:12px}
.tl-tbl td{border:1px solid var(--rule);padding:4px 8px}
.tl-tbl .t-lbl{width:52px;background:var(--warm);font-weight:500;color:var(--ink-l);text-align:center;font-size:11px}
.tl-tbl input{width:100%;border:none;padding:2px 4px;font-family:'Noto Sans JP',sans-serif;font-size:12px;background:transparent;outline:none}
/* ACTION BAR */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--rule);padding:10px 16px;display:flex;gap:8px;align-items:center;box-shadow:0 -2px 12px var(--sh);z-index:100}
.btn{padding:9px 18px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:.04em;transition:all .18s;border:none}
.btn-p{background:var(--acc);color:#fff;flex:1}
.btn-p:hover{background:#7a3216}
.btn-s{background:var(--warm);color:var(--ink-l);border:1.5px solid var(--rule);padding:9px 14px}
.btn-s:hover{border-color:var(--acc2);color:var(--acc)}
.save-st{font-size:11px;color:var(--ink-l);opacity:0;transition:opacity .3s;letter-spacing:.04em}
.save-st.show{opacity:1}
/* TOAST */
.toast{position:fixed;top:68px;right:14px;background:var(--ink);color:#fff;padding:9px 14px;border-radius:5px;font-size:12px;letter-spacing:.04em;opacity:0;transform:translateY(-8px);transition:all .25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
/* HISTORY */
.hist-empty{text-align:center;padding:50px 20px;color:var(--rule);font-size:13px}
.hc{background:#fff;border:1px solid var(--rule);border-radius:5px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px var(--sh)}
.hc-hdr{background:var(--warm);padding:9px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--rule);cursor:pointer}
.hc-ttl{font-size:13px;font-weight:600;color:var(--ink)}
.hc-meta{font-size:11px;color:var(--ink-l);opacity:.7}
.hc-body{padding:10px 12px;display:none}
.hc-body.open{display:block}
.hi{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
.hi:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.hi-q{font-size:11px;color:var(--ink-l);margin-bottom:3px}
.hi-a{font-size:13px;color:var(--ink);white-space:pre-wrap}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">
    マスタープログラム 演習ノート
    <span>Achievement Technology Master Program — 全13STEP</span>

<!-- STEP TABS -->
<div class="step-tabs" id="stepTabs"></div>
<!-- DAY TABS -->
<div class="day-tabs" id="dayTabs"></div>

<div class="content" id="mainContent"></div>

<!-- ACTION BAR -->
<div class="action-bar">
  <button class="btn btn-s" onclick="clearDay()">クリア</button>
  <button class="btn btn-p" onclick="copyData()">📋 スプレッドシート用コピー</button>

</div>
<div class="toast" id="toast"></div>

let curStep = 0, curDay = 0;
const rounds = {};   // key -> round num
const roundMax = {}; // key -> max rounds

function roundKey(sIdx, dIdx) { return `${STEPS[sIdx].id}_${STEPS[sIdx].days[dIdx].id}`; }
function dataKey(sIdx, dIdx, r) { return `mp2_${STEPS[sIdx].id}_${STEPS[sIdx].days[dIdx].id}_r${r}`; }

// ═══════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════
function buildAll() {
  buildStepTabs();
  buildContent();
  activateStep(0);
}

function buildStepTabs() {
  const st = document.getElementById('stepTabs');
  st.innerHTML = '';
  STEPS.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'step-tab' + (i===0?' active':'');
    d.textContent = s.label;
    d.onclick = () => activateStep(i);
    st.appendChild(d);
  });
  // 履歴タブ
  const hist = document.createElement('div');
  hist.className = 'step-tab';
  hist.id = 'histTab';
  hist.textContent = '📋 履歴';
  hist.onclick = showHistory;
  st.appendChild(hist);
}

function buildContent() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  STEPS.forEach((step, si) => {
    const sp = document.createElement('div');
    sp.className = 'step-panel';
    sp.id = 'sp_' + si;
    step.days.forEach((day, di) => {
      const dp = document.createElement('div');
      dp.className = 'day-panel';
      dp.id = `dp_${si}_${di}`;
      dp.innerHTML = buildDayHTML(step, day, si, di);
      sp.appendChild(dp);
    });
    mc.appendChild(sp);
  });
  // history panel
  const hp = document.createElement('div');
  hp.id = 'historyPanel';
  hp.style.display = 'none';
  mc.appendChild(hp);
}

function buildDayHTML(step, day, si, di) {
  const rk = roundKey(si, di);
  let html = `<div class="day-hdr">
    <div class="day-badge">${day.badge}</div>
    <div class="day-theme">${day.theme}</div>
    <div class="day-week">${day.week}</div>
  </div>
  <div class="round-row" id="rr_${rk}">
    <span class="round-lbl">周回：</span>
    <button class="round-btn active" onclick="switchRound(${si},${di},1)">1</button>
    <button class="add-round" onclick="addRound(${si},${di})" title="周回追加">＋</button>
  </div>`;
  day.questions.forEach(q => {
    html += buildQuestion(q, si, di);
  });
  return html;
}

  const rk = roundKey(si, di);
  const pfx = `${rk}_r1_${q.id}`;
  if (q.type === 'textarea') {

      <div class="qb-body"><textarea id="${pfx}" rows="3" placeholder="${q.ph||'…'}" oninput="autoResize(this);autoSave(${si},${di})"></textarea></div></div>`;

  if (q.type === 'note') {
    return `<div style="padding:10px 14px;margin-bottom:12px;background:var(--warm);border:1px solid var(--rule);border-radius:5px;font-size:13px;color:var(--ink-l)">${q.text}</div>`;

  }
  if (q.type === 'pp3') {
    let inner = [1,2,3].map(n => `<div class="pg">
      <span class="sub-lbl">パワーパートナーとしたい人</span><input type="text" class="name-inp" id="${rk}_r1_${q.id}_pp${n}name" placeholder="名前" oninput="autoSave(${si},${di})">
      <span class="sub-lbl">力を借りたいこと</span><textarea id="${rk}_r1_${q.id}_pp${n}help" rows="1" placeholder="…" oninput="autoResize(this);autoSave(${si},${di})"></textarea>
      <span class="sub-lbl">共通の目的目標</span><textarea id="${rk}_r1_${q.id}_pp${n}goal" rows="1" placeholder="…" oninput="autoResize(this);autoSave(${si},${di})"></textarea>
    </div>`).join('');
    return `<div class="qb"><div class="qh"><div class="qt">${q.label}</div></div><div class="qb-body">${inner}</div></div>`;
  }
  if (q.type === 'roles3') {
    let inner = [1,2,3].map(n => `<div class="pg">
      <span class="sub-lbl">役割</span><input type="text" class="name-inp" id="${rk}_r1_${q.id}_r${n}role" placeholder="例：親、経営者、パートナー…" oninput="autoSave(${si},${di})">
      <span class="sub-lbl">暗示の言葉</span><textarea id="${rk}_r1_${q.id}_r${n}word" rows="2" placeholder="私は…" oninput="autoResize(this);autoSave(${si},${di})"></textarea>
    </div>`).join('');
    return `<div class="qb"><div class="qh"><div class="qt">${q.label}</div></div><div class="qb-body">${inner}</div></div>`;
  }
  if (q.type === 'life_stages') {
    let rows = ['学習の段階','指導力開発の段階','挑戦の段階','富の形成の段階','社会還元の段階'].map((s,i) => `<tr>
      <td><input type="text" id="${rk}_r1_${q.id}_age${i}" placeholder="歳〜歳" onchange="autoSave(${si},${di})" style="width:100%;border:none;padding:5px 8px;font-size:12px;background:transparent;outline:none"></td>
      <td class="rl">${s}</td>
      <td><input type="text" id="${rk}_r1_${q.id}_todo${i}" placeholder="取り組むこと" onchange="autoSave(${si},${di})" style="width:100%;border:none;padding:5px 8px;font-size:12px;background:transparent;outline:none"></td>
    </tr>`).join('');
    return `<div class="qb"><div class="qh"><div class="qt">${q.label}</div></div><div class="qb-body">
      <table class="tbl"><thead><tr><th style="width:22%">年齢</th><th style="width:34%">段階</th><th>取り組むこと</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }
  if (q.type === 'timeline') {
    const hours = ['5:00','6:00','7:00','8:00','9:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00','23:00','24:00','25:00','26:00'];
    let rows = hours.map((h,i) => `<tr><td class="t-lbl">${h}</td><td><input type="text" id="${rk}_r1_${q.id}_h${i}" placeholder="" onchange="autoSave(${si},${di})"></td></tr>`).join('');
    return `<div class="qb"><div class="qh"><div class="qt">${q.label}</div></div><div class="qb-body">
      <table class="tl-tbl">${rows}</table></div></div>`;
  }
  // fallback
  return `<div class="qb"><div class="qh"><div class="qt">${q.label||''}</div></div>
    <div class="qb-body"><textarea id="${pfx}" rows="3" placeholder="…" oninput="autoResize(this);autoSave(${si},${di})"></textarea></div></div>`;
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function activateStep(si) {
  curStep = si;
  // step tabs
  document.querySelectorAll('.step-tab').forEach((t,i) => t.classList.toggle('active', i===si));
  document.getElementById('histTab').classList.remove('active');
  // step panels
  document.querySelectorAll('.step-panel').forEach((p,i) => p.classList.toggle('active', i===si));
  document.getElementById('historyPanel').style.display = 'none';
  // day tabs
  buildDayTabs(si);
  activateDay(si, 0);
}

function buildDayTabs(si) {
  const dt = document.getElementById('dayTabs');
  dt.innerHTML = '';
  STEPS[si].days.forEach((day, di) => {
    const d = document.createElement('div');
    d.className = 'day-tab' + (di===0?' active':'');
    d.textContent = day.label;
    d.id = `dt_${si}_${di}`;
    d.onclick = () => activateDay(si, di);
    dt.appendChild(d);
  });
}

function activateDay(si, di) {
  curDay = di;
  const rk = roundKey(si, di);
  if (!rounds[rk]) rounds[rk] = 1;
  if (!roundMax[rk]) roundMax[rk] = parseInt(localStorage.getItem(`mp2_roundmax_${rk}`)||'1');
  // day tabs
  document.querySelectorAll(`[id^="dt_${si}_"]`).forEach((t,i) => t.classList.toggle('active', i===di));
  // day panels
  document.querySelectorAll(`#sp_${si} .day-panel`).forEach((p,i) => p.classList.toggle('active', i===di));
  renderRoundBtns(si, di);
  loadData(si, di, rounds[rk]);
  setTimeout(autoResizeAll, 50);
}

// ═══════════════════════════════════════════
// ROUNDS
// ═══════════════════════════════════════════
function renderRoundBtns(si, di) {
  const rk = roundKey(si, di);
  const rr = document.getElementById(`rr_${rk}`);
  if (!rr) return;
  const cur = rounds[rk]||1;
  const max = roundMax[rk]||1;
  rr.querySelectorAll('.round-btn').forEach(b => b.remove());
  const addBtn = rr.querySelector('.add-round');
  for (let i=1; i<=max; i++) {
    const btn = document.createElement('button');
    btn.className = 'round-btn' + (i===cur?' active':'');
    btn.textContent = i;
    btn.onclick = ((n) => () => switchRound(si,di,n))(i);
    rr.insertBefore(btn, addBtn);
  }
}

function switchRound(si, di, r) {
  saveData(si, di);
  const rk = roundKey(si, di);
  rounds[rk] = r;
  renderRoundBtns(si, di);
  loadData(si, di, r);
  setTimeout(autoResizeAll, 50);
}

function addRound(si, di) {
  saveData(si, di);
  const rk = roundKey(si, di);
  roundMax[rk] = (roundMax[rk]||1) + 1;
  localStorage.setItem(`mp2_roundmax_${rk}`, roundMax[rk]);
  rounds[rk] = roundMax[rk];
  renderRoundBtns(si, di);
  loadData(si, di, rounds[rk]);
  setTimeout(autoResizeAll, 50);
}

// ═══════════════════════════════════════════
// DATA SAVE / LOAD
// ═══════════════════════════════════════════
function collectData(si, di) {
  const rk = roundKey(si, di);
  const r = rounds[rk]||1;
  const prefix = `${rk}_r${r}_`;
  const data = {};
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => {
    if (el.type === 'checkbox') data[el.id] = el.checked;
    else if (el.id) data[el.id] = el.value;
  });
  return data;
}

function saveData(si, di) {
  const rk = roundKey(si, di);
  const r = rounds[rk]||1;
  const data = collectData(si, di);
  data._ts = new Date().toISOString();
  localStorage.setItem(dataKey(si, di, r), JSON.stringify(data));
}

function loadData(si, di, r) {
  const rk = roundKey(si, di);
  const prefix = `${rk}_r${r}_`;
  // clear
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => {
    if (el.type === 'checkbox') el.checked = false;
    else el.value = '';
  });
  const raw = localStorage.getItem(dataKey(si, di, r));
  if (!raw) return;
  const data = JSON.parse(raw);
  Object.entries(data).forEach(([k,v]) => {
    if (k === '_ts') return;
    const el = document.getElementById(k);
    if (!el) return;
    if (el.type === 'checkbox') el.checked = !!v;
    else el.value = v||'';
  });
}

let saveTimer = null;
function autoSave(si, di) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveData(si !== undefined ? si : curStep, di !== undefined ? di : curDay);
    const s = document.getElementById('saveSt');
    s.textContent = '✓ 自動保存済み';
    s.classList.add('show');
    setTimeout(() => s.classList.remove('show'), 1800);
  }, 600);
}

// ═══════════════════════════════════════════
// COPY
// ═══════════════════════════════════════════
function copyData() {
  saveData(curStep, curDay);
  const rk = roundKey(curStep, curDay);
  const r = rounds[rk]||1;
  const raw = localStorage.getItem(dataKey(curStep, curDay, r));
  const step = STEPS[curStep];
  const day = step.days[curDay];
  const now = new Date();
  const ds = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  let lines = [`【${step.label} - ${day.badge} | 周回${r} | ${ds}】`, ''];
  const panel = document.getElementById(`dp_${curStep}_${curDay}`);
  panel.querySelectorAll('.qb').forEach(qb => {
    const qt = qb.querySelector('.qt');
    if (qt) lines.push(`■ ${qt.textContent.trim().replace(/\s+/g,' ')}`);
    qb.querySelectorAll('textarea,[type="text"],[type="number"]').forEach(el => {
      if (el.value.trim()) {
        const lbl = el.previousElementSibling;
        lines.push(lbl && lbl.classList.contains('sub-lbl') ? `  ${lbl.textContent}：${el.value.trim()}` : `  ${el.value.trim()}`);
      }
    });
    const cks = [];
    qb.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
      const lb = el.parentElement.querySelector('label');
      if(lb) cks.push(lb.textContent.trim());
    });
    if(cks.length) lines.push(`  チェック：${cks.join('、')}`);
    lines.push('');
  });
  // pledge
  const pl = panel.querySelector('[id$="pledge"]');
  if (pl && pl.value.trim()) { lines.push('【実践への誓い】'); lines.push(pl.value.trim()); }
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    saveHistory(curStep, curDay, r, ds);
    showToast('📋 コピー完了！スプレッドシートに貼り付けてください');
    updateHistoryContent();
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    saveHistory(curStep, curDay, r, ds);
    showToast('📋 コピー完了！スプレッドシートに貼り付けてください');
    updateHistoryContent();
  });
}

function saveHistory(si, di, r, ds) {
  const hist = JSON.parse(localStorage.getItem('mp2_history')||'[]');
  const rk = roundKey(si, di);
  const data = collectData(si, di);
  hist.unshift({si,di,r,ds,rk,data,ts:Date.now()});
  if(hist.length>80) hist.pop();
  localStorage.setItem('mp2_history', JSON.stringify(hist));
}

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
function showHistory() {
  document.querySelectorAll('.step-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('histTab').classList.add('active');
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('historyPanel').style.display = 'block';
  document.getElementById('dayTabs').innerHTML = '';
  updateHistoryContent();
}

function updateHistoryContent() {
  const hp = document.getElementById('historyPanel');
  if(!hp || hp.style.display==='none') return;
  const hist = JSON.parse(localStorage.getItem('mp2_history')||'[]');
  if (!hist.length) { hp.innerHTML='<div class="hist-empty">まだ履歴がありません。<br>各Dayで回答してコピーしてください。</div>'; return; }
  hp.innerHTML = hist.map((h,i) => {
    const step = STEPS[h.si]; const day = step ? step.days[h.di] : null;
    const title = day ? `${step.label} - ${day.label} / 周回${h.r}` : `記録 ${i+1}`;
    const items = Object.entries(h.data||{}).filter(([k,v])=>k!=='_ts'&&v&&typeof v==='string'&&v.trim()).slice(0,5)
      .map(([,v])=>`<div class="hi"><div class="hi-a">${v.trim().substring(0,80)}${v.length>80?'…':''}</div></div>`).join('');
    return `<div class="hc"><div class="hc-hdr" onclick="toggleHist(${i})"><div class="hc-ttl">${title}</div><div class="hc-meta">${h.ds}</div></div>
      <div class="hc-body" id="hb_${i}">${items||'<div style="color:var(--rule);font-size:12px">（チェックのみ）</div>'}</div></div>`;
  }).join('');
}

function toggleHist(i) { const b=document.getElementById(`hb_${i}`); b.classList.toggle('open'); }

// ═══════════════════════════════════════════
// CLEAR
// ═══════════════════════════════════════════
function clearDay() {
  if(!confirm('このDayの現在の周回の回答をクリアしますか？')) return;
  const rk = roundKey(curStep, curDay);
  const r = rounds[rk]||1;
  const prefix = `${rk}_r${r}_`;
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => {
    if(el.type==='checkbox') el.checked=false; else el.value='';
  });
  localStorage.removeItem(dataKey(curStep, curDay, r));
  showToast('クリアしました');
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function autoResizeAll() { document.querySelectorAll('textarea').forEach(autoResize); }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// START
window.addEventListener('load', buildAll);
</script>
